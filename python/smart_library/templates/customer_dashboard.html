<link rel="stylesheet" href="/static/style.css">

<style>

body{

    margin:0;

    font-family:Arial, Helvetica, sans-serif;

    background:
    radial-gradient(circle at top,
    #0f2b6b 0%,
    #081127 40%,
    #050816 100%);

    color:white;
}

/* NAVBAR */
.navbar{

    padding:22px 40px;

    font-size:30px;

    font-weight:800;

    background:
    rgba(255,255,255,0.06);

    backdrop-filter:blur(16px);

    border-bottom:
    1px solid rgba(255,255,255,0.08);

    position:sticky;

    top:0;

    z-index:1000;

    box-shadow:
    0 4px 25px rgba(0,0,0,0.25);
}

/* MAIN CONTAINER */
.container{

    padding:35px;

    max-width:1400px;

    margin:auto;
}

/* ACTION BUTTONS */
.top-buttons{

    display:flex;

    gap:18px;

    flex-wrap:wrap;

    margin-bottom:25px;
}

.top-buttons button{

    padding:14px 24px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(135deg,#2563eb,#7c3aed);

    color:white;

    font-weight:700;

    cursor:pointer;

    transition:0.3s ease;
}

.top-buttons button:hover{

    transform:
    translateY(-3px)
    scale(1.03);

    box-shadow:
    0 12px 30px rgba(37,99,235,0.35);
}

/* REMINDER CARD */
.reminder-card{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:22px;

    font-size:16px;

    color:#facc15;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.25);
}

/* SEARCH */
#search{

    width:100%;

    padding:18px;

    border:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    outline:none;

    font-size:16px;

    margin-top:25px;

    transition:0.3s ease;
}

#search:focus{

    box-shadow:
    0 0 0 3px rgba(37,99,235,0.35);
}

#search::placeholder{

    color:#cbd5e1;
}

/* GRID */
.grid{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));

    gap:28px;
}

/* CARD */
.card{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    border:
    1px solid rgba(255,255,255,0.08);

    border-radius:28px;

    overflow:hidden;

    transition:0.35s ease;

    box-shadow:
    0 12px 35px rgba(0,0,0,0.28);

    padding:20px;
}

.card:hover{

    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 20px 45px rgba(0,0,0,0.4);
}

/* BOOK IMAGE */
.card img{

    width:100%;

    height:320px;

    object-fit:cover;

    border-radius:20px;

    margin-bottom:18px;

    background:#1e293b;
}

/* TITLES */
.card h3{

    font-size:24px;

    margin-bottom:10px;
}

.card p{

    color:#cbd5e1;

    line-height:1.6;
}

/* VIEW BUTTON */
.card button{

    width:100%;

    margin-top:18px;

    padding:15px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(135deg,#16a34a,#22c55e);

    color:white;

    font-size:15px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s ease;
}

.card button:hover{

    transform:scale(1.03);

    box-shadow:
    0 12px 30px rgba(34,197,94,0.35);
}

/* SECTION TITLE */
.section-title{

    font-size:34px;

    margin-top:45px;

    margin-bottom:25px;

    font-weight:800;
}

/* MOBILE */
@media(max-width:700px){

    .navbar{

        font-size:24px;

        padding:20px;
    }

    .container{

        padding:20px;
    }

    .grid{

        grid-template-columns:1fr;
    }

}

</style>

<!-- NAVBAR -->
<div class="navbar">
📚 {{lib}} Library
</div>

<div class="container">

<!-- TOP ACTION BUTTONS -->
<div class="top-buttons">

<a href="/borrow_history">
<button>📜 My History</button>
</a>

<a href="/payments">
<button>💳 Payment History</button>
</a>

</div>

<!-- REMINDER -->
<div class="reminder-card">
⚠ Make sure to return books before due date to avoid fine.
</div>

<!-- SEARCH -->
<input
    type="text"
    id="search"
    placeholder="🔍 Search books..."
    onkeyup="searchBooks()"
>

<br><br>

<!-- BOOK LIST -->
<div class="grid" id="bookGrid">

{% for b in books %}

<div class="card">

<img
    src="{{b.image}}"
    onerror="this.src='/static/book.png'"
>

<h3>{{b.title}}</h3>

<p><strong>Author:</strong> {{b.author}}</p>

<p style="font-size:14px;">
{{b.summary}}
</p>

<a href="/book/{{b.id}}">
<button>
View Book
</button>
</a>

</div>

{% endfor %}

</div>

<!-- RECOMMENDED -->
<h2 class="section-title">
🔥 Recommended Books
</h2>

<div class="grid">

{% for b in books[:3] %}

<div class="card">

<img
    src="{{b.image}}"
    onerror="this.src='/static/book.png'"
>

<h3>{{b.title}}</h3>

<p>{{b.author}}</p>

</div>

{% endfor %}

</div>

</div>

<!-- SEARCH SCRIPT -->
<script>

function searchBooks(){

let input =
document.getElementById("search")
.value
.toLowerCase();

let cards =
document.getElementsByClassName("card");

for(let i=0;i<cards.length;i++){

let text =
cards[i].innerText.toLowerCase();

cards[i].style.display =
text.includes(input) ? "" : "none";

}

}

</script>
