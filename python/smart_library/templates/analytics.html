<!DOCTYPE html>
<html>
<head>
    <title>Analytics Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
            color:white;
            padding:30px;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        h2{
            margin-bottom:10px;
        }

        button{
            border:none;
            padding:12px 18px;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            background:linear-gradient(90deg,#2563eb,#7c3aed);
            color:white;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card{
            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border:1px solid rgba(255,255,255,0.08);

            border-radius:24px;

            padding:28px;

            text-align:center;

            box-shadow:0 8px 32px rgba(0,0,0,0.28);

            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .card h3{
            font-size:34px;
            margin-bottom:10px;
            color:#60a5fa;
        }

        .chart-card{
            margin-top:30px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(14px);

            border-radius:24px;

            padding:20px;
        }

        canvas{
            margin-top:20px;
            max-height:400px;
        }

    </style>
</head>

<body>

<div class="top">

    <h2>📊 Analytics Dashboard</h2>

    <a href="/owner_dashboard">
        <button>⬅ Dashboard</button>
    </a>

</div>

<!-- 🔥 STATS -->
<div class="cards">

    <div class="card">
        <h3>{{ total_books or 0 }}</h3>
        <p>Total Books</p>
    </div>

    <div class="card">
        <h3>{{ total_borrows or 0 }}</h3>
        <p>Total Borrows</p>
    </div>

    <div class="card">
        <h3>₹{{ income or 0 }}</h3>
        <p>Total Income</p>
    </div>

    <div class="card">
        <h3>₹{{ fines or 0 }}</h3>
        <p>Fines Collected</p>
    </div>

</div>

<!-- 🔥 BAR CHART -->
<div class="chart-card">

<h3>📈 Library Overview</h3>

<canvas id="barChart"></canvas>

</div>

<!-- 🔥 PIE CHART -->
<div class="chart-card">

<h3>💳 Payment Distribution</h3>

<canvas id="pieChart"></canvas>

</div>

<script id="stats-data" type="application/json">
{{ {
    "books": total_books or 0,
    "borrows": total_borrows or 0,
    "income": income or 0,
    "fines": fines or 0,
    "cash": cash or 0,
    "upi": upi or 0
} | tojson }}
</script>

<script>

const stats = JSON.parse(
    document.getElementById("stats-data").textContent
);

/* 🔥 BAR */
new Chart(document.getElementById("barChart"), {

    type:"bar",

    data:{
        labels:["Books","Borrows","Income","Fines"],

        datasets:[{
            label:"Library Overview",

            data:[
                stats.books,
                stats.borrows,
                stats.income,
                stats.fines
            ],

            backgroundColor:[
                "#3b82f6",
                "#22c55e",
                "#f59e0b",
                "#ef4444"
            ],

            borderRadius:10
        }]
    },

    options:{
        responsive:true,

        plugins:{
            legend:{
                labels:{
                    color:"white"
                }
            }
        },

        scales:{
            x:{
                ticks:{ color:"white" }
            },

            y:{
                ticks:{ color:"white" },
                beginAtZero:true
            }
        }
    }

});

/* 🔥 PIE */
new Chart(document.getElementById("pieChart"), {

    type:"doughnut",

    data:{
        labels:["Cash","UPI"],

        datasets:[{
            data:[stats.cash,stats.upi],

            backgroundColor:[
                "#22c55e",
                "#8b5cf6"
            ]
        }]
    },

    options:{
        plugins:{
            legend:{
                labels:{
                    color:"white"
                }
            }
        }
    }

});

</script>

</body>
</html>
