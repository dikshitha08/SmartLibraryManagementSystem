{% extends "base.html" %}

{% block content %}

<div class="card" style="max-width:600px;margin:auto;padding:20px;">

<h2 style="margin-bottom:20px;">📚 Borrow Book</h2>

<hr>

<h3>{{ book.name }}</h3>

<p><b>Author:</b> {{ book.author }}</p>

<p><b>Price:</b> ₹{{ book.price }}</p>

<p><b>Maximum Days:</b> {{ book.max_days }}</p>

<br>

<form method="POST" action="">

    <!-- EMAIL -->
    <input 
        type="email"
        name="email"
        placeholder="Your Email"
        required
        style="
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        "
    >

    <!-- PHONE -->
    <input 
        type="text"
        name="phone"
        placeholder="Phone Number"
        required
        style="
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        "
    >

    <!-- ADDRESS -->
    <textarea
        name="address"
        placeholder="Your Address"
        required
        style="
            width:100%;
            padding:12px;
            margin:10px 0;
            height:100px;
            border:1px solid #ccc;
            border-radius:6px;
        "
    ></textarea>

    <!-- PAYMENT -->
    <select
        name="payment"
        required
        style="
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:6px;
        "
    >
        <option value="">Select Payment Method</option>
        <option value="Cash">Cash</option>
        <option value="UPI">UPI</option>
    </select>

    <br><br>

    <!-- SUBMIT -->
    <button 
        type="submit"
        class="btn-success"
        style="
            width:100%;
            padding:12px;
            font-size:16px;
        "
    >
        📥 Send Borrow Request
    </button>

</form>

</div>

{% endblock %}
