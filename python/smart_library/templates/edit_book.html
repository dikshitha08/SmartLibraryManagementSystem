{% extends "base.html" %}
{% block content %}

<h2>Edit Book</h2>

<div class="card" style="max-width:500px;margin:auto;">

<form method="POST">

<input name="name" value="{{ book.name }}" required>
<input name="author" value="{{ book.author }}" required>
<input name="summary" value="{{ book.summary }}">
<input name="quantity" type="number" value="{{ book.quantity }}">
<input name="price" type="number" value="{{ book.price }}">
<input name="max_days" type="number" value="{{ book.max_days }}">
<input name="fine_per_day" type="number" value="{{ book.fine_per_day }}">

<br><br>
<button class="btn-primary">Update Book</button>

</form>

</div>

{% endblock %}
