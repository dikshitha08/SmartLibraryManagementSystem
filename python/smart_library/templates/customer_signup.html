<!DOCTYPE html>
<html>

<head>

    <title>Customer Signup</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{

        min-height:100vh;

        background:
        radial-gradient(circle at top,
        #0f2b6b 0%,
        #081127 40%,
        #050816 100%);

        font-family:Arial, Helvetica, sans-serif;

        display:flex;

        justify-content:center;

        align-items:center;

        padding:40px 20px;

        color:white;
    }

    /* CARD */
    .signup-container{

        width:100%;
        max-width:500px;

        background:
        rgba(255,255,255,0.08);

        backdrop-filter:blur(18px);

        border:
        1px solid rgba(255,255,255,0.08);

        border-radius:32px;

        padding:42px;

        box-shadow:
        0 20px 60px rgba(0,0,0,0.45);

        animation:fadeUp 0.7s ease;
    }

    /* ICON */
    .icon{

        font-size:52px;

        text-align:center;

        margin-bottom:18px;
    }

    /* TITLE */
    .signup-title{

        text-align:center;

        font-size:40px;

        font-weight:800;

        margin-bottom:10px;

        background:
        linear-gradient(90deg,#22c55e,#14b8a6);

        background-clip:text;

        -webkit-background-clip:text;

        -webkit-text-fill-color:transparent;
    }

    .signup-subtitle{

        text-align:center;

        color:#cbd5e1;

        margin-bottom:35px;

        font-size:15px;
    }

    /* INPUTS */
    .signup-container input{

        width:100%;

        padding:16px;

        margin-bottom:18px;

        border:none;

        border-radius:18px;

        background:
        rgba(255,255,255,0.08);

        color:white;

        outline:none;

        font-size:15px;

        transition:0.3s ease;
    }

    .signup-container input:focus{

        transform:scale(1.02);

        box-shadow:
        0 0 0 3px rgba(34,197,94,0.35);
    }

    .signup-container input::placeholder{

        color:#cbd5e1;
    }

    /* BUTTON */
    .signup-btn{

        width:100%;

        padding:16px;

        border:none;

        border-radius:18px;

        background:
        linear-gradient(135deg,#16a34a,#22c55e);

        color:white;

        font-size:16px;

        font-weight:700;

        cursor:pointer;

        transition:0.3s ease;

        margin-top:8px;
    }

    .signup-btn:hover{

        transform:
        translateY(-4px)
        scale(1.02);

        box-shadow:
        0 15px 35px rgba(34,197,94,0.35);
    }

    .signup-btn:disabled{

        background:#475569;

        cursor:not-allowed;

        box-shadow:none;
    }

    /* PASSWORD MESSAGE */
    #passwordMsg{

        font-size:14px;

        margin-top:-8px;

        margin-bottom:15px;
    }

    /* LOGIN LINK */
    .login-text{

        text-align:center;

        margin-top:24px;

        color:#cbd5e1;
    }

    .login-text a{

        color:#4ade80;

        text-decoration:none;

        font-weight:700;
    }

    /* ANIMATION */
    @keyframes fadeUp{

        from{
            opacity:0;
            transform:translateY(30px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }

    }

    /* MOBILE */
    @media(max-width:600px){

        .signup-container{

            padding:28px;
        }

        .signup-title{

            font-size:32px;
        }

    }

    </style>

</head>

<body>

<div class="signup-container">

    <div class="icon">
        👤
    </div>

    <h1 class="signup-title">
        Customer Signup
    </h1>

    <p class="signup-subtitle">
        Create your smart library account
    </p>

    <form method="POST" onsubmit="return validatePassword()">

        <input
            name="username"
            placeholder="Username"
            required
        >

        <input
            name="email"
            type="email"
            placeholder="Email Address"
            required
        >

        <input
            name="phone"
            placeholder="Phone Number"
            required
        >

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter Password"
            required
        >

        <p id="passwordMsg"></p>

        <button
            id="submitBtn"
            class="signup-btn"
        >
            Create Account
        </button>

    </form>

    <p class="login-text">

        Already have an account?
        <a href="/customer_login">
            Login
        </a>

    </p>

</div>

<script>

let passwordInput = document.getElementById("password");

let msg = document.getElementById("passwordMsg");

let btn = document.getElementById("submitBtn");

passwordInput.addEventListener("input", function() {

    let pwd = passwordInput.value;

    let message = "";

    let isValid = true;

    if (pwd.length < 6) {

        message = "❌ Minimum 6 characters";

        isValid = false;
    }

    else if (!/[0-9]/.test(pwd)) {

        message = "❌ Add at least 1 number 🔢";

        isValid = false;
    }

    else if (!/[!@#$%^&*]/.test(pwd)) {

        message = "❌ Add a special character 🔐";

        isValid = false;
    }

    else {

        message = "✅ Strong password 💪";

        msg.style.color = "#22c55e";
    }

    if (!isValid) {

        msg.style.color = "#ef4444";
    }

    msg.innerText = message;

    btn.disabled = !isValid;
});

// FINAL CHECK
function validatePassword() {

    if (btn.disabled) {

        alert("❌ Please use a strong password!");

        return false;
    }

    return true;
}

</script>

</body>

</html>
