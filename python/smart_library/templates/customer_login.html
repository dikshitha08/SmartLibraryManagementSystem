<!DOCTYPE html>
<html>

<head>

    <title>Customer Login</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{

        min-height:100vh;

        background:
        radial-gradient(circle at top,
        #0f2b6b 0%,
        #081127 40%,
        #050816 100%);

        font-family:Arial, Helvetica, sans-serif;

        display:flex;

        justify-content:center;

        align-items:center;

        overflow:hidden;

        color:white;
    }

    /* LOGIN CARD */
    .login-container{

        width:420px;

        background:
        rgba(255,255,255,0.08);

        backdrop-filter:blur(18px);

        border:
        1px solid rgba(255,255,255,0.08);

        border-radius:32px;

        padding:42px;

        box-shadow:
        0 20px 60px rgba(0,0,0,0.45);

        animation:fadeUp 0.7s ease;
    }

    /* ICON */
    .icon{

        font-size:52px;

        text-align:center;

        margin-bottom:18px;
    }

    /* TITLE */
    .login-title{

        text-align:center;

        font-size:42px;

        font-weight:800;

        margin-bottom:12px;

        background:
        linear-gradient(90deg,#22c55e,#14b8a6);

        background-clip:text;

        -webkit-background-clip:text;

        -webkit-text-fill-color:transparent;
    }

    .login-subtitle{

        text-align:center;

        color:#cbd5e1;

        margin-bottom:35px;

        font-size:15px;
    }

    /* INPUTS */
    .login-container input{

        width:100%;

        padding:16px;

        margin-bottom:18px;

        border:none;

        border-radius:18px;

        background:
        rgba(255,255,255,0.08);

        color:white;

        outline:none;

        font-size:15px;

        transition:0.3s ease;
    }

    .login-container input:focus{

        transform:scale(1.02);

        box-shadow:
        0 0 0 3px rgba(34,197,94,0.35);
    }

    .login-container input::placeholder{

        color:#cbd5e1;
    }

    /* BUTTON */
    .login-btn{

        width:100%;

        padding:16px;

        border:none;

        border-radius:18px;

        background:
        linear-gradient(135deg,#16a34a,#22c55e);

        color:white;

        font-size:16px;

        font-weight:700;

        cursor:pointer;

        transition:0.3s ease;

        margin-top:8px;
    }

    .login-btn:hover{

        transform:
        translateY(-4px)
        scale(1.02);

        box-shadow:
        0 15px 35px rgba(34,197,94,0.35);
    }

    /* SIGNUP LINK */
    .signup-text{

        text-align:center;

        margin-top:24px;

        color:#cbd5e1;
    }

    .signup-text a{

        color:#4ade80;

        text-decoration:none;

        font-weight:700;
    }

    /* ANIMATION */
    @keyframes fadeUp{

        from{
            opacity:0;
            transform:translateY(30px);
        }

        to{
            opacity:1;
            transform:translateY(0);
        }

    }

    /* MOBILE */
    @media(max-width:500px){

        .login-container{

            width:92%;

            padding:28px;
        }

        .login-title{

            font-size:34px;
        }

    }

    </style>

</head>

<body>

<div class="login-container">

    <div class="icon">
        👤
    </div>

    <h1 class="login-title">
        Customer Login
    </h1>

    <p class="login-subtitle">
        Access your smart library account
    </p>

    <form method="POST">

        <input
            name="username"
            placeholder="Enter Username"
            required
        >

        <input
            name="password"
            type="password"
            placeholder="Enter Password"
            required
        >

        <button class="login-btn">
            Login
        </button>

    </form>

    <p class="signup-text">

        New user?
        <a href="/customer_signup">
            Create Account
        </a>

    </p>

</div>

</body>

</html>
